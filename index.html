<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Sprint</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="350"></canvas>
        <div id="ui-overlay">
            <div id="score-display">SCORE 000000</div>
            <div id="start-screen">
                <h1>Neon Sprint</h1>
                <div class="controls-desktop">
                    <p>Press <kbd>Space</kbd> or <kbd>Up</kbd> to Jump</p>
                    <p>Press <kbd>Down</kbd> to Slide</p>
                    <p>Press <kbd>Esc</kbd> to Pause</p>
                </div>
                <div class="controls-mobile">
                    <p>Tap top half to Jump</p>
                    <p>Tap bottom half to Slide</p>
                </div>
                <div id="start-leaderboard" class="leaderboard-container"></div>
                <p class="start-prompt start-prompt-desktop">Press any key to start</p>
                <p class="start-prompt start-prompt-mobile">Tap to start</p>
            </div>
            <div id="game-over-screen" class="hidden">
                <h1>Flatlined</h1>
                <p id="final-score"></p>
                <p id="high-score"></p>
                <div id="game-over-leaderboard" class="leaderboard-container"></div>
                <p class="start-prompt start-prompt-desktop">Press any key to jack back in</p>
                <p class="start-prompt start-prompt-mobile">Tap to jack back in</p>
            </div>
            <div id="pause-screen" class="hidden">
                <h1>Paused</h1>
                <p id="pause-score"></p>
                <div class="pause-buttons">
                    <button id="resume-btn" class="neon-btn">Resume</button>
                    <button id="quit-btn" class="neon-btn neon-btn-quit">Quit</button>
                </div>
            </div>
        </div>
        <div id="touch-controls" class="hidden">
            <div id="touch-zone-jump">
                <span class="touch-label">TAP TO JUMP</span>
            </div>
            <div id="touch-zone-slide">
                <span class="touch-label">TAP TO SLIDE</span>
            </div>
        </div>
        <button id="pause-btn-mobile" class="hidden" aria-label="Pause">&#10074;&#10074;</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
