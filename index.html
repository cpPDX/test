<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Sprint</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="350"></canvas>
        <div id="ui-overlay">
            <div id="score-display">SCORE 000000</div>
            <div id="start-screen">
                <h1>Neon Sprint</h1>
                <p>Press <kbd>Space</kbd> or <kbd>Up</kbd> to Jump</p>
                <p>Press <kbd>Down</kbd> to Slide</p>
                <p>Press <kbd>Esc</kbd> to Pause</p>
                <div id="start-leaderboard" class="leaderboard-container"></div>
                <p class="start-prompt">Press any key to start</p>
            </div>
            <div id="game-over-screen" class="hidden">
                <h1>Flatlined</h1>
                <p id="final-score"></p>
                <p id="high-score"></p>
                <div id="game-over-leaderboard" class="leaderboard-container"></div>
                <p class="start-prompt">Press any key to jack back in</p>
            </div>
            <div id="pause-screen" class="hidden">
                <h1>Paused</h1>
                <p id="pause-score"></p>
                <div class="pause-buttons">
                    <button id="resume-btn" class="neon-btn">Resume (R)</button>
                    <button id="quit-btn" class="neon-btn neon-btn-quit">Quit (Q)</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
