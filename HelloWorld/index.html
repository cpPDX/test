<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Sprint</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="350"></canvas>
        <div id="ui-overlay">
            <div id="score-display">SCORE 000000</div>
            <div id="start-screen">
                <h1>Neon Sprint</h1>
                <p>Press <kbd>Space</kbd> or <kbd>Up</kbd> to Jump</p>
                <p>Press <kbd>Down</kbd> to Slide</p>
                <p class="start-prompt">Press any key to start</p>
            </div>
            <div id="game-over-screen" class="hidden">
                <h1>Flatlined</h1>
                <p id="final-score"></p>
                <p id="high-score"></p>
                <p class="start-prompt">Press any key to jack back in</p>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
